# Resolve all *.f to Franklin's Tailscale IP
address=/f/100.112.120.2

# Don't forward .f queries upstream
local=/f/

# Listen on all interfaces (loopback + Tailscale)
listen-address=0.0.0.0

# Upstream DNS for everything else
server=1.1.1.1
server=8.8.8.8

# Don't read /etc/resolv.conf
no-resolv

# Logging
log-queries
log-facility=/dev/stdout
